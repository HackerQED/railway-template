# this is for local development
# for production, see https://github.com/HackerQED/infra
name: mksaas

services:

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mksaas
    volumes:
      - mksaas_data:/var/lib/postgresql/data
    command: ["postgres", "-c", "max_connections=200"]

volumes:
  mksaas_data:
    name: mksaas_data
